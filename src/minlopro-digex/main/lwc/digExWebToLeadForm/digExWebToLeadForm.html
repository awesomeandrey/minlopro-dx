<template>
    <c-dig-ex-re-captcha-form onformsubmit={handleFormSubmit} submit-label="Submit" lwc:ref="reCaptchaForm">
        <input type="hidden" name="oid" value="${SF_INSTANCE_ID}" />
        <!-- Lead custom fields can be passed by field API name as a hidden form parameter -->
        <input type="hidden" name="SrcCode__c" value="digex-site" />
        <input type="hidden" name="PreferredLanguage__c" value={preferredLanguage} />
        <input type="hidden" name="lead_source" value="Web" />
        <!--  ----------------------------------------------------------------------  -->
        <!--  NOTE: These fields are optional debugging elements. Please uncomment    -->
        <!--  these lines if you wish to test in debug mode.                          -->
        <!--            <input type="hidden" name="debug" value="1" />-->
        <!--            <input type="hidden" name="debugEmail" value="${SF_ADMIN_EMAIL}" />-->
        <!--  ----------------------------------------------------------------------  -->
        <div class="slds-form-element">
            <label class="slds-form-element__label" for="first_name">
                <abbr class="slds-required" title="required">* </abbr>First Name</label
            >
            <div class="slds-form-element__control">
                <input
                    id="first_name"
                    maxlength="40"
                    name="first_name"
                    size="20"
                    type="text"
                    class="slds-input"
                    value={firstName}
                    required
                />
            </div>
        </div>
        <div class="slds-form-element">
            <label class="slds-form-element__label" for="last_name">
                <abbr class="slds-required" title="required">* </abbr>Last Name</label
            >
            <div class="slds-form-element__control">
                <input
                    id="last_name"
                    maxlength="40"
                    name="last_name"
                    size="20"
                    type="text"
                    class="slds-input"
                    value={lastName}
                    required
                />
            </div>
        </div>
        <div class="slds-form-element">
            <label class="slds-form-element__label" for="email">Email</label>
            <div class="slds-form-element__control">
                <input id="email" maxlength="40" name="email" size="20" type="email" class="slds-input" value={email} />
            </div>
        </div>
        <c-combobox
            label="Preferred Language"
            value={preferredLanguage}
            options={languageOptions}
            onchange={handleChangePreferredLanguage}
        ></c-combobox>
        <div class="slds-form-element">
            <label class="slds-form-element__label" for="company">Company</label>
            <div class="slds-form-element__control">
                <input id="company" maxlength="40" name="company" size="20" type="text" class="slds-input" value="Minlopro DX" />
            </div>
        </div>
    </c-dig-ex-re-captcha-form>
    <c-error-alert value={errorObj}></c-error-alert>
</template>
